<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Database</title>
</head>
<body>
    <h1>Vagter</h1>

    <table border="1" cellpadding="6">
        <tr>
            <th>ID</th>
            <th>Fornavn</th>
            <th>Efternavn</th>
            <th>Dato</th>
            <th>Starttid</th>
            <th>Sluttid</th>
        </tr>
        {% for v in vagter %}
        <tr>
            <td>{{ v[0] }}</td>
            <td>{{ v[1] }}</td>
            <td>{{ v[2] }}</td>
            <td>{{ v[3] }}</td>
            <td>{{ v[4] }}</td>
            <td>{{ v[5] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/Forside">Log ud</a>
</body>
</html>
